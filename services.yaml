# 1. SERVIÇO PARA EXPOR A SUA APLICAÇÃO (NODEPORT)
apiVersion: v1
kind: Service
metadata:
  name: hello-dka-service
spec:
  type: NodePort
  selector:
    app: hello-dka
  ports:
    - port: 80          # Porta dentro do cluster
      targetPort: 3000  # Porta que o app ouve (definida no Dockerfile)
      nodePort: 30001   # Porta que você vai usar no navegador

---

# 2. POD DO REDIS
apiVersion: v1
kind: Pod
metadata:
  name: redis-pod
  labels:
    app: redis-db
spec:
  containers:
  - name: redis
    image: redis:7.2-alpine
    imagePullPolicy: IfNotPresent
    ports:
    - containerPort: 6379

---

# 3. SERVIÇO PARA O REDIS (CLUSTERIP - APENAS INTERNO)
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  type: ClusterIP
  selector:
    app: redis-db
  ports:
    - port: 6379
      targetPort: 6379

---

apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP